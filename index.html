<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Maksym Pinchuk">
    <title>Каталог комп'ютерних ігор - Головна</title>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        a {
            color: #ffaa00;
        }
    </style>

    <script src="script.js" defer></script>

    <script>
        function checkStatus() {
            let ready = confirm("Бажаєте перевірити статус сервера?");
            if (ready) {
                let code = prompt("Введіть код доступу:", "1111");
                alert("Статус для коду " + code + ": Сервер працює стабільно!");
            }
        }
    </script>
</head>

<body>
    <h1 id="main-title">Мій каталог комп'ютерних ігор!</h1>
    
    <p style="text-align: center; font-size: 20px;">Виберіть гру, щоб прочитати детальний огляд:</p>
    
    <div style="text-align: center; margin: 20px;">
        <button onclick="checkStatus()">Перевірка сервера</button>
        <button onclick="userDialog()">Діалог</button>
        <button onclick="modifyDOM()">Маніпуляції з контентом</button>
        <button onclick="showDeveloperInfo('Пінчук', 'Максим')">Розробник</button>
    </div>

    <div class="game-gallery">
        <div class="game-card">
            <div class="hot-label">ХІТ!</div> 
            <a href="CS_2.html">
                <img src="cs2_main.jpeg" alt="CS2" width="250" height="140"><br>
                <b>Огляд Counter-Strike 2</b>
            </a>
        </div>

        <div class="game-card">
            <a href="bannerlord.html">
                <img src="banner_main.jpeg" alt="Bannerlord" width="250" height="140"><br>
                <b>Огляд Mount & Blade II</b>
            </a>
        </div>

        <div class="game-card">
            <a href="minecraft.html">
                <img src="mine.jpeg" alt="Minecraft" width="250" height="140"><br>
                <b>Огляд Minecraft</b>
            </a>
        </div>
    </div>

    <div id="dynamic-container" style="text-align: center; margin-top: 30px; padding: 10px; border: 1px dashed #455465;">
        <p id="remove-target">Нові ігри з'являться згодом.</p>
        <p id="replace-target">Переглядайте ігри які є в наявності.</p>
    </div>

    <hr>
    <footer style="text-align: center; padding: 20px;">
        <script>
            document.write("<i>Сторінку завантажено о: " + new Date().toLocaleTimeString() + "</i>");
        </script>
    </footer>
</body>
</html>
